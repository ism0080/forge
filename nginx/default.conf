server {
  listen 80;
  server_name _;

  location ~ ^/s/([^/]+)(/.*)?$ {
    set $site_id $1;
    set $asset_path $2;
    if ($asset_path = "") {
      set $asset_path "/index.html";
    }
    if ($asset_path = "/") {
      set $asset_path "/index.html";
    }
    proxy_pass http://api:8787/sites/$site_id$asset_path;
    proxy_set_header Host $host;
  }

  location /api/ {
    proxy_pass http://api:8787;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /health {
    proxy_pass http://api:8787/health;
  }

  location = / {
    proxy_pass http://api:8787/directory;
    proxy_set_header Host $host;
  }

  location / {
    set $site_host $host;
    if ($site_host = "localhost") {
      set $site_host "demo.localhost";
    }
    proxy_pass http://api:8787/sites/$site_host/index.html;
    proxy_set_header Host $host;
  }
}
