services:
  api:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    environment:
      PORT: 8787
      SITE_BUCKET: forge-sites
      STORAGE_ROOT: /app/data
    volumes:
      - forge-data:/app/data
    ports:
      - "8787:8787"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"

volumes:
  forge-data:
